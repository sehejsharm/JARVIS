<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>JARVIS</title>
  <meta name="description" content="JARVIS — your voice-activated morning briefing." />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="JARVIS" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="icon" href="/icons/icon-192.png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --cyan: #22d3ee; --cyan-dim: #0e7490; }
    * { -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; height: 100%;
      background: #000;
      color: #e5f6fb;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      overscroll-behavior: none;
    }
    body {
      background:
        radial-gradient(1200px 800px at 50% -10%, rgba(34,211,238,0.10), transparent 60%),
        radial-gradient(900px 600px at 50% 110%, rgba(34,211,238,0.06), transparent 60%),
        #000;
    }

    /* Arc-reactor core button */
    .core {
      position: relative;
      width: 220px; height: 220px;
      border-radius: 9999px;
      display: grid; place-items: center;
      cursor: pointer;
      background: radial-gradient(circle at 50% 50%, rgba(34,211,238,0.18), rgba(0,0,0,0.6) 70%);
      border: 1px solid rgba(34,211,238,0.5);
      box-shadow:
        0 0 0 1px rgba(34,211,238,0.15),
        0 0 40px rgba(34,211,238,0.25),
        inset 0 0 40px rgba(34,211,238,0.15);
      transition: transform 0.2s ease, box-shadow 0.3s ease;
      user-select: none;
    }
    .core:active { transform: scale(0.97); }
    .core::before, .core::after {
      content: ""; position: absolute; inset: -6px;
      border-radius: 9999px;
      border: 1px solid rgba(34,211,238,0.25);
    }
    .core::after { inset: 18px; border-color: rgba(34,211,238,0.18); }

    .ring-spin {
      position: absolute; inset: 6px; border-radius: 9999px;
      border: 2px dashed rgba(34,211,238,0.35);
      animation: spin 14s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Idle breathing */
    .breathe { animation: breathe 4s ease-in-out infinite; }
    @keyframes breathe {
      0%,100% { box-shadow: 0 0 0 1px rgba(34,211,238,0.15), 0 0 40px rgba(34,211,238,0.25), inset 0 0 40px rgba(34,211,238,0.15); }
      50% { box-shadow: 0 0 0 1px rgba(34,211,238,0.25), 0 0 70px rgba(34,211,238,0.45), inset 0 0 60px rgba(34,211,238,0.25); }
    }

    /* Speaking pulse */
    .speaking { animation: pulse 1.1s ease-in-out infinite; border-color: rgba(34,211,238,0.9); }
    @keyframes pulse {
      0%,100% { transform: scale(1); box-shadow: 0 0 0 1px rgba(34,211,238,0.4), 0 0 50px rgba(34,211,238,0.5), inset 0 0 50px rgba(34,211,238,0.3); }
      50% { transform: scale(1.05); box-shadow: 0 0 0 2px rgba(34,211,238,0.7), 0 0 110px rgba(34,211,238,0.85), inset 0 0 70px rgba(34,211,238,0.5); }
    }

    /* Equalizer bars while speaking */
    .eq { display: flex; gap: 4px; align-items: flex-end; height: 26px; }
    .eq span { width: 4px; background: var(--cyan); border-radius: 2px; height: 6px; animation: eq 0.9s ease-in-out infinite; }
    .eq span:nth-child(2){ animation-delay: 0.15s } .eq span:nth-child(3){ animation-delay: 0.3s }
    .eq span:nth-child(4){ animation-delay: 0.45s } .eq span:nth-child(5){ animation-delay: 0.6s }
    @keyframes eq { 0%,100%{ height:6px } 50%{ height:26px } }

    .glow-text { text-shadow: 0 0 18px rgba(34,211,238,0.45); }
    .panel {
      background: linear-gradient(180deg, rgba(8,20,24,0.7), rgba(2,8,10,0.7));
      border: 1px solid rgba(34,211,238,0.18);
      backdrop-filter: blur(6px);
    }
    .fade-in { animation: fade 0.6s ease both; }
    @keyframes fade { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: none } }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(34,211,238,0.3); border-radius: 3px; }
  </style>
</head>
<body class="min-h-full">
  <div class="min-h-screen flex flex-col items-center px-5 py-8" style="padding-top: max(2rem, env(safe-area-inset-top)); padding-bottom: max(2rem, env(safe-area-inset-bottom));">

    <!-- Header -->
    <header class="text-center mb-2 select-none">
      <h1 class="text-3xl font-semibold tracking-[0.4em] glow-text text-cyan-300">JARVIS</h1>
      <p class="text-[11px] tracking-[0.3em] text-cyan-500/70 mt-1 uppercase">Morning Briefing System</p>
    </header>

    <!-- Core area -->
    <main class="flex-1 w-full max-w-md flex flex-col items-center justify-center gap-7">
      <div id="core" class="core breathe" role="button" tabindex="0" aria-label="Initialize JARVIS">
        <div class="ring-spin"></div>
        <div id="coreInner" class="text-center px-4">
          <div id="coreLabel" class="text-cyan-200 font-medium tracking-widest text-sm">INITIALIZE</div>
          <div id="coreSub" class="text-cyan-500/70 text-[10px] tracking-widest mt-1 uppercase">tap to begin</div>
          <div id="eq" class="eq hidden mt-2 justify-center">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <div id="status" class="text-xs tracking-widest text-cyan-500/60 uppercase h-4">Standby</div>
    </main>

    <!-- Briefing panel -->
    <section id="briefingPanel" class="panel rounded-2xl w-full max-w-md mt-6 p-5 hidden fade-in">
      <div class="flex items-center justify-between mb-3">
        <span class="text-[11px] tracking-[0.25em] text-cyan-400/80 uppercase">Daily Briefing</span>
        <div class="flex gap-2">
          <button id="replayBtn" class="text-[11px] tracking-widest text-cyan-300 border border-cyan-400/30 rounded-full px-3 py-1 active:scale-95 transition">REPLAY</button>
          <button id="stopBtn" class="text-[11px] tracking-widest text-cyan-300 border border-cyan-400/30 rounded-full px-3 py-1 active:scale-95 transition">STOP</button>
        </div>
      </div>
      <p id="briefingText" class="text-[15px] leading-relaxed text-cyan-50/90"></p>
      <div id="metaLine" class="text-[10px] text-cyan-600/60 mt-4 tracking-wider"></div>
    </section>

    <!-- Data tiles -->
    <section id="tiles" class="w-full max-w-md grid grid-cols-2 gap-3 mt-4 hidden">
      <div id="weatherTile" class="panel rounded-xl p-3"></div>
      <div id="marketTile" class="panel rounded-xl p-3"></div>
      <div id="newsTile" class="panel rounded-xl p-3 col-span-2"></div>
    </section>

    <footer class="text-[10px] text-cyan-700/50 tracking-widest mt-8 uppercase select-none">For Mr. Sharma · Udaipur</footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
